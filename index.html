<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Entrepreneur Paradise</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="title-screen" class="screen active">
<h1>Entrepreneur Paradise</h1><p class="subtitle">36 months. One shot. Build your empire.</p><p id="version-line" style="color:var(--text2);font-size:0.7rem;margin-bottom:20px;opacity:0.5;">v0.10.0</p>
<div id="archetype-list"></div>
<button class="btn-outline" onclick="Game.showLeaderboard('title')" style="max-width:420px;width:100%;margin-top:20px;">Leaderboard</button>
<div id="whats-new"></div>
</div>
<div id="opening-screen" class="screen"><div class="month-header"><h2>Month 1</h2></div><div id="opening-narrative" class="narrative-box"></div><div id="opening-mentor" class="narrative-box" style="border-left-color:var(--gold);"></div><button class="btn-primary" onclick="Game.startGame()">Begin Your Journey</button></div>
<div id="game-screen" class="screen"><div class="month-header"><h2 id="month-label">Month 1</h2><span class="stage-badge" id="stage-badge">Foundation</span></div><div id="month-narrative" class="narrative-box"></div><div id="character-line" class="narrative-box" style="border-left-color:var(--gold);display:none;"></div><div id="stats-dashboard" class="stats-grid"></div><div id="bars-section" class="bars-section"></div><div id="step-indicator" class="step-indicator"></div><div class="category-tabs" id="cat-tabs"></div><div id="action-list"></div><div class="bottom-bar"><button class="btn-primary" id="confirm-actions-btn" onclick="Game.confirmActions()">End Turn (0/3 actions)</button></div></div>
<div id="lifestyle-screen" class="screen"><div class="lifestyle-header"><h3>Quarterly Life Check-In</h3><p>Business isn't everything. What are you doing for the rest of your life?</p></div><div id="lifestyle-scores" class="stats-grid"></div><div id="lifestyle-list"></div><div class="bottom-bar"><button class="btn-primary" id="lifestyle-btn" disabled onclick="Game.confirmLifestyle()">Choose a Lifestyle Action</button><button class="btn-secondary" onclick="Game.skipLifestyle()" style="margin-top:6px;">Skip This Quarter</button></div></div>
<div id="event-screen" class="screen"><div class="month-header"><h2 id="event-month-label">Event</h2></div><div id="event-box" class="event-box"></div><div id="event-choices"></div></div>
<div id="result-screen" class="screen"><div class="month-header"><h2 id="result-month-label">Results</h2></div><div id="results-content"></div><div class="bottom-bar"><button class="btn-primary" onclick="Game.nextMonth()">Continue to Next Month</button></div></div>
<div id="checkpoint-screen" class="screen"><div id="checkpoint-content"></div></div>
<div id="end-screen" class="screen"><div class="final-title"><h2 id="end-title"></h2><p class="final-subtitle" id="end-subtitle"></p></div><div class="radar-wrap"><canvas id="radar-canvas" width="300" height="300"></canvas></div><div id="score-breakdown" class="stats-grid"></div><div id="epilogue" class="epilogue-box"></div><div id="end-save" style="margin-top:16px;"></div></div>
<div id="leaderboard-screen" class="screen"><div id="lb-content"></div></div>
<div id="popup-container" style="display:none;"><div class="popup-overlay" onclick="Game.hidePopup()"></div><div class="popup-box"><div class="popup-title" id="popup-title"></div><div id="popup-body"></div><button class="btn-secondary" onclick="Game.hidePopup()">Got it</button></div></div>

<script src="js/game.js"></script>
</body>
</html>
