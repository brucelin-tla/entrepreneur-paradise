<!DOCTYPE html>
<html lang="en">
<head>

<title>Entrepreneur Paradise</title>
<style>
/* Entrepreneur Paradise — styles */
:root{--bg:#0a0e17;--bg2:#111827;--bg3:#1a2236;--surface:#1f2937;--surface2:#273349;--border:#2d3a50;--text:#e8ecf2;--text2:#9ca3b4;--accent:#10b981;--accent2:#059669;--gold:#f59e0b;--red:#ef4444;--blue:#3b82f6;--purple:#8b5cf6;--orange:#f97316;--pink:#ec4899;--radius:12px;--radius-sm:8px}
*{margin:0;padding:0;box-sizing:border-box}html,body{height:100%}
body{font-family:'Segoe UI',-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;overflow-x:hidden}
.screen{display:none;min-height:100vh;padding:16px;padding-bottom:100px}.screen.active{display:block}
#title-screen{position:relative}
#title-screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:100vh;background:linear-gradient(180deg,var(--bg) 0%,#0d1520 50%,var(--bg) 100%)}
#title-bg{position:fixed;inset:0;z-index:0;pointer-events:none}
#title-bg svg{width:100%;height:100%;display:block}
#title-screen.active>*:not(#title-bg){position:relative;z-index:1}
#title-screen h1{font-size:2.2rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
#title-screen .subtitle{color:var(--text2);font-size:0.95rem;margin-bottom:40px}
.archetype-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px;text-align:left;width:100%;max-width:420px;cursor:pointer;transition:all 0.2s}
.archetype-card:active{transform:scale(0.98);border-color:var(--accent)}.archetype-card h3{font-size:1.1rem;margin-bottom:2px}
.archetype-card .tagline{color:var(--accent);font-size:0.85rem;margin-bottom:8px}.archetype-card p{color:var(--text2);font-size:0.85rem;line-height:1.5}
.month-header{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);margin-bottom:16px}.month-header h2{font-size:1.15rem}
.month-header .stage-badge{font-size:0.7rem;padding:3px 10px;border-radius:20px;background:var(--accent2);color:white;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.narrative-box{background:var(--bg2);border-left:3px solid var(--accent);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:16px;margin-bottom:16px;font-size:0.92rem;line-height:1.75;color:var(--text)}
.narrative-box .char-name{color:var(--gold);font-weight:600;font-size:0.8rem;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.stat-card{background:var(--surface);border-radius:var(--radius-sm);padding:10px;text-align:center;position:relative}
.stat-card.wide{grid-column:span 3}.stat-card.half{grid-column:span 1}
.stat-card .stat-value{font-size:1.05rem;font-weight:700}.stat-card .stat-label{font-size:0.65rem;color:var(--text2);text-transform:uppercase;letter-spacing:0.3px}
.stat-positive{color:var(--accent)}.stat-negative{color:var(--red)}.stat-warning{color:var(--gold)}.stat-neutral{color:var(--text)}
.info-btn{display:inline-block;width:16px;height:16px;border-radius:50%;background:var(--border);color:var(--text2);font-size:0.6rem;text-align:center;line-height:16px;cursor:pointer;margin-left:4px;vertical-align:middle;font-weight:700}
.term-link{color:var(--blue);text-decoration:underline dotted;cursor:pointer;text-decoration-thickness:1px;text-underline-offset:2px}
.popup-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:999}
.popup-box{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;z-index:1000;max-width:340px;width:calc(100% - 32px);font-size:0.85rem;line-height:1.6;box-shadow:0 10px 40px rgba(0,0,0,0.5);max-height:80vh;overflow-y:auto}
.popup-title{font-weight:700;margin-bottom:8px;color:var(--accent);font-size:1rem}
.bars-section{margin-bottom:16px;background:var(--surface);border-radius:var(--radius-sm);padding:10px 14px}
.bar-row{margin-bottom:6px}.bar-row:last-child{margin-bottom:0}
.bar-label{font-size:0.7rem;color:var(--text2);margin-bottom:3px;display:flex;justify-content:space-between}
.bar-track{height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width 0.5s,background 0.5s}
.step-indicator{text-align:center;margin-bottom:12px;font-size:0.8rem;color:var(--text2)}.step-indicator .step-current{color:var(--accent);font-weight:700}
.category-tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.cat-tab{flex-shrink:0;padding:8px 16px;border-radius:20px;font-size:0.8rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text2);transition:all 0.2s;white-space:nowrap}
.cat-tab.active{background:var(--accent);color:white;border-color:var(--accent)}.cat-tab.done{background:var(--accent2);color:white;border-color:var(--accent2);opacity:0.7}
.action-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;cursor:pointer;transition:all 0.2s}
.action-card:active{transform:scale(0.98)}.action-card.selected{border-color:var(--accent);background:var(--bg3)}
.action-card.locked{opacity:0.4;cursor:not-allowed}.action-card.completed-action{opacity:0.3;cursor:not-allowed}
.action-card h4{font-size:0.95rem;margin-bottom:4px}.action-card p{font-size:0.82rem;color:var(--text2);line-height:1.5;margin-bottom:8px}
.action-costs{display:flex;gap:8px;font-size:0.75rem;flex-wrap:wrap}
.cost-tag{padding:2px 8px;border-radius:10px;font-weight:600}
.cost-cash{background:rgba(239,68,68,0.15);color:var(--red)}.cost-energy{background:rgba(239,68,68,0.1);color:var(--orange)}
.cost-energy-gain{background:rgba(16,185,129,0.15);color:var(--accent)}
.cost-locked{background:rgba(156,163,180,0.15);color:var(--text2)}.cost-done{background:rgba(16,185,129,0.15);color:var(--accent)}
.cost-recurring{background:rgba(139,92,246,0.15);color:var(--purple)}
.repeat-badge{font-size:0.7rem;color:var(--gold);margin-left:6px;font-weight:400}
.new-badge{display:inline-block;background:var(--accent);color:#04210f;font-size:0.55rem;font-weight:700;padding:1px 6px;border-radius:8px;margin-left:6px;vertical-align:middle;letter-spacing:0.6px}
.action-card.is-new{border-color:var(--accent)}
.btn-primary{width:100%;padding:14px;border:none;border-radius:var(--radius);background:var(--accent);color:white;font-size:1rem;font-weight:700;cursor:pointer;transition:all 0.2s;margin-top:8px}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed}.btn-primary:active:not(:disabled){transform:scale(0.98);background:var(--accent2)}
.btn-secondary{width:100%;padding:12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:0.9rem;font-weight:600;cursor:pointer;transition:all 0.2s;margin-top:8px}
.btn-outline{width:100%;padding:12px;border:1px solid var(--gold);border-radius:var(--radius);background:transparent;color:var(--gold);font-size:0.9rem;font-weight:600;cursor:pointer;margin-top:8px}
.event-box{background:var(--bg2);border:1px solid var(--gold);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.event-box .event-category{font-size:0.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--gold);font-weight:700;margin-bottom:8px}
.event-box .event-narrative{font-size:0.92rem;line-height:1.75}
.choice-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;cursor:pointer;transition:all 0.2s}
.choice-card:active{transform:scale(0.98);border-color:var(--gold)}.choice-card h4{font-size:0.95rem;margin-bottom:6px}.choice-effects{font-size:0.78rem;color:var(--text2)}
.result-narrative{background:var(--bg2);border-radius:var(--radius);padding:16px;margin-bottom:12px;font-size:0.9rem;line-height:1.75}
.effect-list{padding:12px}.effect-item{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:0.85rem}.effect-item:last-child{border-bottom:none}
.radar-wrap{display:flex;justify-content:center;margin:20px 0}.radar-wrap canvas{max-width:300px;width:100%}
.final-title{text-align:center;margin:20px 0}
.final-title h2{font-size:1.8rem;background:linear-gradient(135deg,var(--accent),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.final-title .final-subtitle{color:var(--text2);font-size:0.95rem}
.epilogue-box{background:var(--bg2);border-radius:var(--radius);padding:20px;font-size:0.92rem;line-height:1.8;margin-top:16px;white-space:pre-line}
.lifestyle-header{text-align:center;margin-bottom:16px}.lifestyle-header h3{color:var(--purple);margin-bottom:4px}.lifestyle-header p{color:var(--text2);font-size:0.85rem}
.fade-in{animation:fadeIn 0.3s ease-out}@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;padding:12px 16px;background:linear-gradient(transparent,var(--bg) 30%);padding-top:30px}
.breakdown-row{display:flex;justify-content:space-between;padding:4px 0;font-family:monospace;font-size:0.85rem}
.breakdown-total{border-top:1px solid var(--border);margin-top:6px;padding-top:6px;font-weight:700}
.breakdown-detail{font-size:0.75rem;color:var(--text2);padding-left:12px}
.lb-tabs{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.lb-tab{padding:6px 14px;border-radius:16px;font-size:0.78rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text2)}
.lb-tab.active{background:var(--accent);color:white;border-color:var(--accent)}
.lb-entry{display:flex;justify-content:space-between;align-items:center;padding:10px;background:var(--surface);border-radius:var(--radius-sm);margin-bottom:6px}
.lb-rank{font-weight:700;color:var(--gold);width:30px}.lb-name{flex:1;margin-left:8px}.lb-score{font-weight:700;color:var(--accent)}
.lb-date{font-size:0.7rem;color:var(--text2);margin-left:8px}
.name-input{width:100%;padding:12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg2);color:var(--text);font-size:1rem;margin:8px 0}
.checkpoint-score{text-align:center;font-size:2rem;font-weight:800;color:var(--gold);margin:10px 0}
.checkpoint-label{text-align:center;font-size:0.8rem;color:var(--text2);text-transform:uppercase;letter-spacing:1px}
.skill-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;font-size:0.7rem;color:var(--text2)}
.skill-row .skill-name{width:70px;text-align:right}.skill-bar{flex:1;height:4px;background:var(--bg);border-radius:2px;overflow:hidden}
.skill-fill{height:100%;border-radius:2px;background:var(--purple)}

</style>
</head>

  "actions_marketing": {

    {
      "id": "build_offer",
      "category": "marketing",
      "stage": "foundation",
      "one_time": true,
      "label": "Refine Your Offer",
      "description": "Stop selling time. Package your expertise into a clear, premium offer with defined scope and pricing — so every customer is worth more.",
      "lesson": "Sell outcomes, not hours — to people who can pay. A sharper, premium offer raises the value of every single customer you have, which is far more powerful than just adding more of them.",

      "failure_effects": { "brand_equity": 2, "leads": 3 },
      "narrative_success": "The new pricing feels scary — and every new prospect is saying yes faster than before. You were undercharging.",
      "narrative_failure": "Two clients pushed back on the new pricing. You compromised on one. The packaging needs another pass."

      "success_rate": 0.6,

      "narrative_success": "A local business podcast featured you. Three inbound calls the next week, all mentioning the episode — and none of them flinched at your rates.",

    {

  "actions_operations": {
  "version": "1.0.0",
  "actions": [
    {
      "id": "do_work_yourself",
      "category": "operations",
      "stage": "foundation",
      "label": "Do the Work Yourself",
      "description": "You are the business. Every client, every deliverable, every email. It's unsustainable, but it gets the work delivered and the invoices paid.",
      "lesson": "Do it yourself first — not forever. You can't systematize or delegate what you don't deeply understand. Master the work, bank the cash, then escape it before you become the bottleneck.",
      "cash_cost": 0,
      "energy_cost": 20,
      "prerequisites": { "customer_base_gte": 1 },
      "effects": { "cash": 1000, "systems_maturity": 3, "key_person_dependency": 5 },
      "success_rate": 0.9,
      "failure_effects": { "cash": 400 },
      "narrative_success": "Everything got done. Everything. You're exhausted, but every client is happy — because you did it all personally, and the invoices got paid.",
      "narrative_failure": "You dropped a ball. One client got a late delivery. Nothing catastrophic, but a reminder that one person can't do everything."
    },
    {
      "id": "hire_first_contractor",
      "category": "operations",
      "stage": "foundation",
      "label": "Hire Your First Contractor",
      "description": "Offload delivery work to someone else for the first time. Terrifying. Necessary. It buys you capacity.",
      "lesson": "Your first hire won't be as good as you — and that's fine. 80% done by someone else beats 100% done by you alone. Trading money for delivery capacity is the whole game.",
      "cash_cost": 1500,
      "energy_cost": 10,
      "prerequisites": {},
      "effects": { "team_size": 1, "systems_maturity": 5, "key_person_dependency": -10, "revenue_capacity": 5000 },

      "narrative_success": "She's not as good as you. She's 80% as good, and that 80% just bought you back twenty hours a week of capacity.",
      "narrative_failure": "The contractor needs more hand-holding than expected. You're spending time managing instead of doing — but that's the transition."
    },
    {
      "id": "hire_delivery_team",

      "id": "fulfillment_system",
      "category": "operations",
      "stage": "leverage",
      "label": "Build Fulfillment System",
      "description": "Systematize delivery end-to-end: intake, production, QA, delivery, follow-up. All documented, all tracked — so you can take on far more without quality cracking.",
      "lesson": "Turn delivery into an assembly line — intake, production, QA, delivery, follow-up, all documented. Consistency at scale lets you grow capacity without your quality cracking.",

      "energy_cost": 14,
      "prerequisites": { "systems_maturity_gte": 25, "team_size_gte": 2 },
      "effects": { "systems_maturity": 18, "churn_rate": -0.03, "revenue_capacity": 10000, "brand_equity": 8 },

      "energy_cost": 12,
      "prerequisites": { "systems_maturity_gte": 50, "brand_equity_gte": 40 },

  "actions": [
    {"id":"executive_health_retreat","category":"lifestyle","subcategory":"health","label":"Executive Health Retreat","description":"A week at a luxury wellness retreat — bloodwork panels, IV therapy, personal chef, guided recovery. The reset button for people who can afford to press it.","cash_cost":8000,"energy_cost":-25,"effects":{"lifestyle_health":25,"energy":25,"fitness_level":15},"narrative":"Seven days of silence, supplements, and sleep. You came back a different person. Your team noticed before you said anything."},
    {"id":"concierge_medicine","category":"lifestyle","subcategory":"health","label":"Join a Concierge Medical Practice","description":"Pay a retainer for a doctor who actually knows your name. Same-day appointments, proactive health monitoring, direct cell phone access.","cash_cost":2000,"energy_cost":-8,"effects":{"lifestyle_health":18,"energy":10,"fitness_level":8},"recurring_cost":500,"narrative":"Your doctor texted you — texted — about your lab results. 'Everything looks great, but let's adjust your vitamin D.' This is what healthcare is supposed to feel like."},
    {"id":"fitness_training","category":"lifestyle","subcategory":"health","label":"Hire a Personal Trainer","description":"Three sessions a week with someone who won't let you skip. Structured training, accountability, results.","cash_cost":800,"energy_cost":-12,"effects":{"lifestyle_health":20,"energy":12,"fitness_level":20},"recurring_cost":200,"narrative":"The trainer doesn't care about your quarterly revenue. She cares about your deadlift form. For three hours a week, you're not a CEO — you're an athlete."},
    {"id":"gym_routine","category":"lifestyle","subcategory":"health","label":"Start a Gym Routine","description":"Three days a week. Nothing heroic — just showing up consistently. Your energy and focus improve.","cash_cost":150,"energy_cost":-10,"effects":{"lifestyle_health":15,"energy":10,"fitness_level":10,"lifestyle_experiences":3},"recurring_cost":150,"narrative":"You haven't missed a workout in three weeks. You're sleeping better. Thinking clearer. Funny how moving your body fixes your brain."},
    {"id":"sleep_routine","category":"lifestyle","subcategory":"health","label":"Optimize Your Sleep","description":"Blackout curtains, no screens after 9, consistent bedtime. The cheapest performance upgrade that exists.","cash_cost":200,"energy_cost":-15,"effects":{"lifestyle_health":15,"energy":15,"fitness_level":5},"narrative":"You're sleeping seven hours now instead of five. The difference isn't subtle — your decision-making is sharper, your patience is longer, and that afternoon crash is gone."},
    {"id":"morning_routine","category":"lifestyle","subcategory":"health","label":"Build a Morning Routine","description":"Wake up early. Journal, move, plan the day before the day plans you. Discipline before the inbox.","cash_cost":0,"energy_cost":-10,"effects":{"lifestyle_health":8,"energy":10,"fitness_level":3},"narrative":"5:30 AM. Coffee, journal, twenty minutes of movement, then the three most important tasks before anyone else is awake. You own the morning now."},
    {"id":"annual_physical","category":"lifestyle","subcategory":"health","label":"Get a Full Physical","description":"Blood work, stress test, the works. Know your numbers before they surprise you.","cash_cost":500,"energy_cost":-3,"effects":{"lifestyle_health":8,"energy":5,"fitness_level":5},"narrative":"The doctor said everything looks good — except your cortisol. 'You're running hot,' she said. 'Dial it back before your body does it for you.'"},
    {"id":"luxury_vacation","category":"lifestyle","subcategory":"relationships","label":"Luxury Family Vacation","description":"First class, five-star, no budget. Show your family what you've been building this for. Two weeks of undivided presence.","cash_cost":15000,"energy_cost":-25,"effects":{"lifestyle_relationships":30,"lifestyle_experiences":20,"energy":25},"narrative":"Your kid looked at you across the dinner table in Santorini and said, 'This is the best trip ever.' You realized it wasn't the hotel — it was that you left your laptop at home."},
    {"id":"couples_retreat","category":"lifestyle","subcategory":"relationships","label":"Couples Retreat Weekend","description":"A guided weekend away with your partner — structured conversations, reconnection exercises, no distractions.","cash_cost":3000,"energy_cost":-10,"effects":{"lifestyle_relationships":22,"lifestyle_spiritual":5,"energy":10},"narrative":"You said things you'd been holding for months. So did she. It wasn't easy — but by Sunday night you were holding hands again."},
    {"id":"family_trip","category":"lifestyle","subcategory":"relationships","label":"Family Trip","description":"A real vacation. Not a 'working from the hotel' trip. Phone off, out of office on.","cash_cost":3000,"energy_cost":-20,"effects":{"lifestyle_relationships":20,"lifestyle_experiences":15,"energy":20},"narrative":"Your kid asked if you could do this 'every month.' You can't. But the fact that they asked means you've been gone too long."},
    {"id":"date_night","category":"lifestyle","subcategory":"relationships","label":"Weekly Date Night","description":"Put the phone away. Be present with the person who's been watching you disappear into work.","cash_cost":400,"energy_cost":-5,"effects":{"lifestyle_relationships":18,"energy":5},"recurring_cost":400,"narrative":"She laughed at dinner — really laughed — for the first time in months. You realized you'd missed the sound."},
    {"id":"bucket_list_experience","category":"lifestyle","subcategory":"experiences","label":"Bucket List Experience","description":"Skydiving, racing a supercar, private cooking class with a Michelin chef — pick the thing you always said 'someday' about.","cash_cost":5000,"energy_cost":-15,"effects":{"lifestyle_experiences":25,"energy":15,"lifestyle_relationships":5},"narrative":"You jumped out of a plane at 14,000 feet. For thirty seconds, nothing existed but wind and sky and the absurd joy of being alive."},
    {"id":"masterclass_workshop","category":"lifestyle","subcategory":"experiences","label":"Elite Workshop or Masterclass","description":"A weekend intensive with a world-class expert — photography, wine, leadership. Learning at the highest level.","cash_cost":3000,"energy_cost":-8,"effects":{"lifestyle_experiences":18,"brand_equity":5,"leads":3},"narrative":"The instructor was a former CEO turned artist. The other attendees were the kind of people you want in your network. You learned to paint — and picked up two warm leads."},
    {"id":"adventure_trip","category":"lifestyle","subcategory":"experiences","label":"Solo Adventure","description":"Go somewhere you've never been. Alone. Remember what it feels like to be a person, not a role.","cash_cost":2000,"energy_cost":-15,"effects":{"lifestyle_experiences":20,"energy":15,"lifestyle_spiritual":5},"narrative":"Standing on a mountain in another state, phone dead, watching the sun go down. Your business is still running. You might be okay."},
    {"id":"learn_new_skill","category":"lifestyle","subcategory":"experiences","label":"Learn Something New","description":"Take a class in something that has nothing to do with your business. Cooking, music, a language.","cash_cost":500,"energy_cost":-5,"effects":{"lifestyle_experiences":10,"energy":5},"narrative":"Your pottery is terrible. You love it. For two hours a week, you're a beginner again — and it's the most relaxed you've been in months."},
    {"id":"spiritual_pilgrimage","category":"lifestyle","subcategory":"spiritual","label":"Spiritual Pilgrimage","description":"Walk the Camino, visit a sacred site, or take a solo journey to a place that pulls at your soul. Not a vacation — a reckoning.","cash_cost":6000,"energy_cost":-18,"effects":{"lifestyle_spiritual":25,"lifestyle_experiences":15,"energy":18},"narrative":"You walked for twelve days. By the end, the blisters didn't matter. Something shifted — not in your business plan, but in your relationship with why you're building at all."},
    {"id":"silent_retreat","category":"lifestyle","subcategory":"spiritual","label":"Silent Meditation Retreat","description":"Ten days. No phone, no talking, no distractions. Just you and the noise in your head — until the noise stops.","cash_cost":4000,"energy_cost":-20,"effects":{"lifestyle_spiritual":28,"lifestyle_health":10,"energy":20},"narrative":"By day three you wanted to leave. By day seven you didn't want it to end. You came back quieter — and that quiet became the most productive force in your life."},
    {"id":"faith_community","category":"lifestyle","subcategory":"spiritual","label":"Join a Faith Community","description":"Find a church, temple, sangha, or circle. Belong to something bigger than your P&L statement.","cash_cost":200,"energy_cost":-5,"effects":{"lifestyle_spiritual":20,"lifestyle_relationships":5,"energy":5},"recurring_cost":200,"narrative":"The pastor asked how business was going. You said 'hard.' He said 'good — that means you're growing.' Simple words. They landed."},
    {"id":"meditation_practice","category":"lifestyle","subcategory":"spiritual","label":"Start a Meditation Practice","description":"Ten minutes a day. Sit with the noise in your head instead of running from it.","cash_cost":50,"energy_cost":-8,"effects":{"lifestyle_spiritual":18,"energy":8,"lifestyle_health":5},"recurring_cost":50,"narrative":"You sat still for ten minutes today without reaching for your phone. It was the hardest and easiest thing you've done all month."},
    {"id":"start_foundation","category":"lifestyle","subcategory":"philanthropy","label":"Launch a Charitable Foundation","description":"Set up a donor-advised fund or small foundation. Give strategically, build legacy, and get the tax benefits.","cash_cost":10000,"energy_cost":-8,"one_time":true,"effects":{"lifestyle_philanthropy":30,"lifestyle_legacy":10,"brand_equity":15,"audit_risk":-5},"narrative":"The foundation is established. Your name is on something that will outlast your business. The first grant went to a scholarship fund — the kid's thank-you letter is framed on your wall."},
    {"id":"major_donation","category":"lifestyle","subcategory":"philanthropy","label":"Make a Major Donation","description":"Write a five-figure check to a cause that defines what you stand for.","cash_cost":10000,"energy_cost":-3,"effects":{"lifestyle_philanthropy":25,"brand_equity":10,"lifestyle_legacy":8},"narrative":"The hospital wing dedication had your name on a small plaque. You didn't do it for the plaque — but your kids saw it."},
    {"id":"charity_donation","category":"lifestyle","subcategory":"philanthropy","label":"Charitable Giving","description":"Write a check to a cause that matters. Not for the tax deduction — for the reminder that money is a tool, not a scoreboard.","cash_cost":2000,"energy_cost":-2,"effects":{"lifestyle_philanthropy":18,"brand_equity":3,"audit_risk":-2},"narrative":"The director of the food bank sent a handwritten thank-you note. It's pinned above your desk now."},
    {"id":"volunteer_time","category":"lifestyle","subcategory":"philanthropy","label":"Volunteer Your Time","description":"Spend a Saturday building houses, mentoring kids, or serving meals.","cash_cost":0,"energy_cost":-5,"effects":{"lifestyle_philanthropy":15,"lifestyle_relationships":3,"energy":5,"lifestyle_legacy":5},"narrative":"You spent six hours building a wheelchair ramp for a stranger. Your back hurts. Your heart doesn't."},
    {"id":"write_book","category":"lifestyle","subcategory":"legacy","label":"Write Your Book","description":"Hire a ghostwriter or lock yourself in a cabin. Document what you've learned — the failures, the wins, the real story.","cash_cost":5000,"energy_cost":-15,"one_time":true,"effects":{"lifestyle_legacy":30,"brand_equity":20,"leads":10},"narrative":"The manuscript is done. 47,000 words of everything you wish someone had told you. The publisher said yes."},
    {"id":"family_wealth_council","category":"lifestyle","subcategory":"legacy","label":"Establish Family Wealth Council","description":"Monthly family meetings about money, values, and the future. Teach your kids what school won't.","cash_cost":1000,"energy_cost":-5,"effects":{"lifestyle_legacy":22,"lifestyle_relationships":10},"recurring_cost":200,"narrative":"Your teenager asked about compound interest at dinner. Your partner brought up charitable giving goals. This is generational wealth — the conversations."},
    {"id":"estate_planning","category":"lifestyle","subcategory":"legacy","label":"Estate Planning Session","description":"Meet with an estate attorney. Make sure what you're building survives you and benefits the people you love.","cash_cost":3000,"energy_cost":-3,"effects":{"lifestyle_legacy":20,"trust_structure":"basic_llc"},"narrative":"Signing the will felt strange — like acknowledging mortality while you're in the middle of building. But your family is protected now."},
    {"id":"mentor_others","category":"lifestyle","subcategory":"legacy","label":"Mentor a Young Entrepreneur","description":"Find someone two years behind you. Share what you've learned. Teaching clarifies your own thinking.","cash_cost":0,"energy_cost":-5,"effects":{"lifestyle_legacy":18,"lifestyle_relationships":3,"brand_equity":3,"lifestyle_philanthropy":5},"narrative":"Your mentee landed her first client this month. She texted you at 11 PM. You smiled when you saw it in the morning."},
    {"id":"therapy_coaching","category":"lifestyle","subcategory":"health","label":"Start Therapy or Coaching","description":"Talk to someone who isn't your spouse, your partner, or your mirror. Process the stress before it processes you.","cash_cost":600,"energy_cost":-12,"effects":{"lifestyle_health":15,"lifestyle_relationships":10,"energy":12},"recurring_cost":400,"narrative":"You said things out loud you've been carrying silently for months. The therapist didn't fix anything — but naming it made it lighter."}

  "scoring_weights": {
  "version": "2.0.0",
  "_comment": "v2 rewrites scoring around DESIGN.md: capital efficiency wins, not raw revenue. Passive tax-free income is the crown jewel; leverage efficiency is a first-class metric; lifestyle strongly gates the final score (see calcComposite). business_revenue is still computed for the radar/archetype flavor but carries ZERO composite weight (it is fuel, not the goal).",
  "dimensions": {
    "passive_income": { "weight": 0.28, "label": "Passive Income", "description": "Mostly tax-free monthly income that arrives without owner hours: policy-loan income, real-estate cashflow, lending interest. The crown jewel." },
    "leverage_efficiency": { "weight": 0.20, "label": "Leverage", "description": "Share of the productive asset base financed with good (OPM) debt — controlling large assets with little of your own cash." },
    "net_worth": { "weight": 0.17, "label": "Net Worth", "description": "Asset equity + cash value + dry-powder credit, minus BAD debt heavily and other debt lightly. Good (asset-backed) debt is not penalized." },
    "lifestyle": { "weight": 0.20, "label": "Lifestyle", "description": "Health, relationships, experiences, spiritual, philanthropy, legacy. Also STRONGLY gates the final composite — no paradise if life is wrecked." },
    "tax_efficiency": { "weight": 0.15, "label": "Tax Efficiency", "description": "Entity structure (LLC -> S-corp), trust, share of income that is tax-free, low effective rate." }
  },
  "lifestyle_sub_weights": {
    "health": 0.20,
    "relationships": 0.20,
    "experiences": 0.15,
    "spiritual": 0.15,
    "philanthropy": 0.15,
    "legacy": 0.15
  }
}

  "archetypes": {
  "version": "1.0.0",
  "win_archetypes": [
    {
      "id": "cashflow_king",
      "title": "Cashflow King",
      "subtitle": "The money works for you now",
      "requires_dominant": "passive_income",
      "description": "You built rivers of income that flow without you lifting a finger.",
      "epilogue": "The alarm didn't go off this morning — because you don't set one anymore. The rental properties deposited their monthly rent while you slept. The insurance policy's cash value grew another tick. The business you built runs on systems and people, not on your personal hours.\n\nYou're not retired. You're free. There's a difference.\n\nThe money comes in whether you work or not. You choose to work because you want to — on the projects that interest you, with the people you like, on your schedule. That's not wealth as a number. That's wealth as a lifestyle.\n\nYour banker smiles when you walk in now. Not because you need anything — because you don't."
    },
    {
      "id": "empire_builder",
      "title": "Empire Builder",
      "subtitle": "You didn't build a business. You built an engine.",
      "requires_dominant": "business_revenue",
      "description": "Revenue, team, systems — you built something that scales.",
      "epilogue": "The company crossed a threshold somewhere around month twenty, and you felt it — the moment it stopped being your job and started being its own thing. A machine that runs, grows, and serves people whether you're in the building or not.\n\nYour team handles the day-to-day. Your systems handle the exceptions. Your brand brings in clients you've never met. You built something bigger than yourself, and that's exactly the point.\n\nThe revenue numbers are impressive. But what really matters is that they'd stay impressive if you stepped away for a month. That's not a business. That's an empire."
    },
    {
      "id": "freedom_architect",
      "title": "Freedom Architect",
      "subtitle": "You built a life, not just a balance sheet",
      "requires_dominant": "lifestyle",
      "requires_secondary": "passive_income",
      "description": "High lifestyle score and strong passive income — the rare founder who built wealth without sacrificing life.",
      "epilogue": "Your partner said something last week that stuck with you: 'You're here now. Like, really here.'\n\nShe's right. The business runs. The income flows. The trust protects it. And you're present — at dinner, at the gym, at the school play, at the meditation cushion, at the volunteer build site on Saturdays.\n\nYou didn't just build wealth. You built a life you don't need a vacation from. The hardest part wasn't the financial engineering — it was learning to stop when every instinct said keep going.\n\nMost founders sacrifice the life to build the business. You found the third door — the one where you build both."
    },
    {
      "id": "leverage_master",
      "title": "Leverage Master",
      "subtitle": "Other people's money, your wealth",
      "requires_dominant": "net_worth",
      "description": "Net worth through strategic use of credit, real estate, and OPM.",
      "epilogue": "Your net worth statement doesn't look like most people's. It's not a savings account — it's a portfolio of leveraged assets, each one producing income, appreciating in value, and sheltered behind entities and trusts that your attorney built like a fortress.\n\nYou used the bank's money to build your wealth. Every dollar of debt is backed by an asset worth more. Every asset is protected by a structure designed to survive anything short of an act of God.\n\nThe banker who once made you nervous now sends you deal flow. The credit score that used to feel like a cage is now a tool you wield with precision. You learned the game — and now you're winning it."
    },
    {
      "id": "burnout_billionaire",
      "title": "Burnout Billionaire",
      "subtitle": "You won the game and lost the plot",
      "requires_dominant": "business_revenue",
      "requires_low": "lifestyle",
      "description": "Big numbers, terrible lifestyle. A cautionary tale in spreadsheet form.",
      "epilogue": "The numbers are impressive. Genuinely impressive. Revenue, net worth, tax efficiency — by every financial measure, you crushed it.\n\nBut you're reading this alone. The gym membership lapsed eighteen months ago. Your last vacation was... you can't remember. Your partner stopped fighting about your hours — which is worse than the fighting.\n\nYou built an empire and forgot to live in it. The money is real. The cost was real too. And the thing about time is that you can't buy it back, no matter how optimized your tax strategy is.\n\nThis isn't a failure. It's a warning. The next 36 months don't have to look like the last."
    }
  ]
}

{v:'0.17.1',d:'2026-06-25 18:45',n:['Fixed: hired staff no longer vanish — people only leave if you genuinely can\'t make payroll after revenue and all your credit; and operating expenses can never go negative (was an event exploit)','Fixed: you can now actually fund your IUL policy, and it funds aggressively (scales with revenue) — drawn from the business as a personal expense instead of silently skipping when personal cash was $0','Fixed: you now pay yourself a real living-wage draw once profitable (a bigger draw, ~25% of revenue), so personal income and cash are no longer starved','"Restructure & Optimize Your Debt" stays the full play (0% business line + pay down cards + shift to business credit + working cash); once it\'s available, the now-redundant standalone credit-line and loan actions fold into it','Random events now scale with your business size and are capped so a single event can never wipe a prepared player']},
{v:'0.17.0',d:'2026-06-25 17:30',n:['Leads, Customers, and Staff now show as mini-bars on the Business side — mirroring Energy, Personal Mastery, and Freedom on the Personal side','Paying yourself is now modeled the legal way: when personal cash runs short, the business borrows on its own line (~6%) into business cash, then pays you a documented owner draw — no commingling','Your capital account (owner equity) is now tracked — it grows with retained business profit and goes down as you take draws, shown on the Business panel and in the Income breakdown','Pass-through taxes (LLC/S-Corp) are settled at year-end from your personal side, tracked as "pass-through tax paid" — set up the monthly tax reserve to pre-fund it instead of getting hit with a lump','Funding order for personal needs: personal cash → owner draw from business cash → liquidate business credit → personal credit as the last resort']},
{v:'0.16.0',d:'2026-06-25 16:45',n:['Every breakdown now splits Personal vs Business — tap Income, Expenses, or Credit Score and you\'ll see your personal side and your business side separately (your business even has its own D&B score)','Your policy\'s cash value now shows as a personal asset, and your salary/passive income visibly lands in your personal cash each month','Money now flows to the right pocket: your insurance/accumulation policy is funded entirely from personal cash, and policy loans pay into your personal account','Loans land where they belong — once you form an LLC, new bank/business loans sit on the business; before that, they\'re personal','The protection policies (income, key-person life, and now general business liability) are a business expense the company pays — key-person is the one life policy the business itself buys','New actions now show a "NEW" badge the first month they unlock — you\'ll never miss a freshly-available move','Rebalanced random events: growing your revenue no longer makes lawsuits and cash-crunches more likely (it just makes them possible), and big settlements are survivable for the prepared','Weak spots can now be prepared for — rate hikes are mitigable, and a capital crunch can be covered from cash reserves (no forced debt) if you kept a buffer','New wealth-path events reward the money engine: borrow tax-free against your policy to seize a deal, and a passive-income milestone moment','Events now fire with fair variety instead of defaulting to the same few; protection (LLC, trust, insurance) visibly pays off when trouble hits']},
{v:'0.15.0',d:'2026-06-25 14:30',n:['Finance streamlined: bundled overlapping actions into stronger single moves — Form LLC & Set Up Books (with monthly bookkeeping), Build Personal Credit, Elect S-Corp & Operating Agreement, Asset Protection Stack, Advanced Tax Strategy, Insure Yourself & the Business, and a full Restructure & Optimize Your Debt play (30 → 22 actions)','Finance actions consolidated from six groups into three clear sections — Foundation & Credit (get established and bankable), Tax & Protection (keep more and shield it), and Wealth & Passive Income (the engine) — matching Marketing and Operations','Dashboard now shows Personal (left) and Business (right) side by side with a divider — clean ledger rows for cash, credit score, credit, expenses, loans, income; the Business side stays locked until you form an LLC, then unlocks business cash, revenue, customers & more','Your money now truly separates once you incorporate: the business earns revenue and pays its bills, then pays you a salary/draw into your personal account where your living costs and tax-free passive income land','Removed the Marketing/Operations/Finance skill bars and renamed Fitness to Personal Mastery for a cleaner founder strip','Operations actions reorganized into three clear stages — Capacity & Delivery (deliver more), Systems & Freedom (run it without you), and Quality & Retention (keep the customers you win)','Removed two duplicate "hire" actions that overlapped marketing; operations is now tighter and each action drives its stage','Marketing actions reorganized into a clean funnel — Offer & Value (raises what each customer is worth), Lead Generation (fills the pipeline), and Sales & Conversion (turns leads into customers) — and every action now actually drives its category’s outcome','Conversion is now a real, stacking stat: sales actions (sales team, CRM, webinar, email nurture) each lift your close rate, shown live on the dashboard','Insurance funding is now an automatic monthly GLOSSARY:{'EBITDA':'Earnings Before Interest, Taxes, Depreciation & Amortization — your business\'s operating profit.','COGS':'Cost of Goods Sold — direct costs to deliver your product/service.','DSCR':'Debt Service Coverage Ratio — operating income divided by debt payments. Above 1.25 is healthy.','SOP':'Standard Operating Procedure — written steps so anyone can do a task without you.','LOC':'Line of Credit — revolving credit you draw from as needed.','LLC':'Limited Liability Company — separates personal assets from business liability.','S-Corp':'S Corporation — tax election splitting income between salary and distributions to save taxes.','CRM':'Customer Relationship Management — software tracking prospects and deals.','EIN':'Employer Identification Number — your business tax ID.','HELOC':'Home Equity Line of Credit.','OPM':'Other People\'s Money — borrowed or investor capital.','JV':'Joint Venture — parties pooling resources for a project.','IP':'Intellectual Property — proprietary methods or technology.','Net Worth':'Assets minus liabilities.','Brand Equity':'Market recognition and perceived value of your business.','Key-Person Dependency':'How much the business relies on you personally.','Churn Rate':'Percentage of customers lost each month.','Utilization':'Percentage of available credit in use. Below 30% boosts score.','Tradeline':'A credit account on your report.','Monthly Burn':'Total monthly expenses across life and business.','Living Expenses':'Personal cost of living — rent, food, utilities, transport.','Holding Company':'A parent entity that owns your operating business(es). It manages money, holds assets, and isolates your personal finances from business operations and liabilities.','Operating Entity':'The business entity that runs day-to-day operations, holds contracts, employs staff, and takes on business debt. Sits under the holding company.','Liability Shield':'Legal separation between entities so that debts and lawsuits against one entity can\'t reach the assets of another.'},

meetsReq(r){if(!r||Object.keys(r).length===0)return true;for(const[k,v]of Object.entries(r)){if(k==='needs'){for(const id of v)if(!(this.state._completed_actions||[]).includes(id))return false;continue;}if(k==='cash_gte'){const ba=Math.max(0,(this.state.business_credit_limit||0)-(this.state.business_credit_used||0));if((this.state.cash||0)+(this.state.available_credit||0)+ba<v)return false;continue;}if(k.endsWith('_gte')&&(this.state[k.replace('_gte','')]||0)<v)return false;if(k.endsWith('_lte')&&(this.state[k.replace('_lte','')]||0)>v)return false;if(k.endsWith('_in')&&!v.includes(this.state[k.replace('_in','')]))return false;if(k.endsWith('_not')&&this.state[k.replace('_not','')]===v)return false;if((k==='entity_structure'||k==='business_credit_profile')&&this.state[k]!==v)return false;}return true;},

showLifestyleScreen(){this.showScreen('lifestyle-screen');this.selectedLifestyle=null;const s=this.state;const scores=[{label:'Health',value:Math.round(s.lifestyle_health),color:s.lifestyle_health>40?'positive':'negative'},{label:'Relationships',value:Math.round(s.lifestyle_relationships),color:s.lifestyle_relationships>40?'positive':'negative'},{label:'Experiences',value:Math.round(s.lifestyle_experiences),color:'neutral'},{label:'Spiritual',value:Math.round(s.lifestyle_spiritual),color:'neutral'},{label:'Philanthropy',value:Math.round(s.lifestyle_philanthropy),color:'neutral'},{label:'Legacy',value:Math.round(s.lifestyle_legacy),color:'neutral'}];document.getElementById('lifestyle-scores').innerHTML='<div style="display:flex;gap:8px;margin-bottom:8px;grid-column:span 3;"><div class="stat-card" style="flex:1;"><div class="stat-value stat-positive" style="font-size:0.9rem;">'+this.fmtMoney(s.cash)+'</div><div class="stat-label">Cash</div></div><div class="stat-card" style="flex:1;"><div class="stat-value stat-neutral" style="font-size:0.9rem;">'+this.fmtMoney(s.available_credit||0)+'</div><div class="stat-label">Credit</div></div></div>'+scores.map(st=>'<div class="stat-card"><div class="stat-value stat-'+st.color+'">'+st.value+'</div><div class="stat-label">'+st.label+'</div></div>').join('');

this._sortedLifestyle.forEach(a=>{

const afford=this.state.cash>=(a.cash_cost||0),active=a.recurring_cost&&this.state._active_lifestyle_costs&&this.state._active_lifestyle_costs[a.id];

document.getElementById('lifestyle-list').innerHTML=listHtml;

confirmLifestyle(){if(!this.selectedLifestyle)return;const a=this.selectedLifestyle;this.state.cash-=(a.cash_cost||0);this.applyEffects(a.effects);if(a.recurring_cost&&!this.state._active_lifestyle_costs[a.id]){this.state._active_lifestyle_costs[a.id]=a.recurring_cost;this.state.lifestyle_expenses=(this.state.lifestyle_expenses||0)+a.recurring_cost;}
const buffs={mentor_others:{delay:3,effects:{leads:5,brand_equity:5,monthly_revenue:500},narrative:"Your mentee referred a client to you. 'You helped me — let me return the favor,' she said."},volunteer_time:{delay:2,effects:{brand_equity:8,leads:3},narrative:"Someone from the volunteer site reached out — they need exactly what you offer. 'I liked how you showed up that Saturday.'"},faith_community:{delay:4,effects:{leads:4,brand_equity:3,lifestyle_relationships:5},narrative:"A fellow member mentioned your business to their network. Three warm introductions this week."},family_trip:{delay:1,effects:{energy:10,lifestyle_relationships:5},narrative:"You came back recharged. Your partner said you seem lighter. The clarity is showing up in your work."},therapy_coaching:{delay:2,effects:{energy:8,lifestyle_health:3},narrative:"The patterns your therapist helped you see — you're catching them in real time now."},learn_new_skill:{delay:3,effects:{brand_equity:5,leads:3},narrative:"The class led to an unexpected connection — your instructor runs a business and just became a client."},charity_donation:{delay:2,effects:{brand_equity:8},narrative:"The charity featured your business in their donor spotlight newsletter. 2,000 people saw it."}};
if(buffs[a.id]){const b=buffs[a.id];if(!this.state._lifestyle_buffs)this.state._lifestyle_buffs=[];this.state._lifestyle_buffs.push({trigger_month:this.month+b.delay,effects:b.effects,narrative:b.narrative,source:a.label});}
if(!this.state._action_counts)this.state._action_counts={};this.state._action_counts[a.id]=(this.state._action_counts[a.id]||0)+1;
this.lifestyleHistory.push(a);this.showScreen('result-screen');document.getElementById('result-month-label').textContent='Lifestyle — '+a.subcategory;document.getElementById('results-content').innerHTML='<div class="result-narrative fade-in"><strong>'+a.label+'</strong><br><br>'+a.narrative+'</div>';this.selectedLifestyle=null;},

skipLifestyle(){this.state.lifestyle_health=Math.max(0,(this.state.lifestyle_health||0)-2);this.state.lifestyle_relationships=Math.max(0,(this.state.lifestyle_relationships||0)-2);this.state.energy=Math.max(0,this.state.energy-3);this.showScreen('result-screen');document.getElementById('result-month-label').textContent='Quarterly Check-In — Skipped';document.getElementById('results-content').innerHTML='<div class="result-narrative fade-in">You skipped the life check-in this quarter. The business needed every dollar and every hour. But the people in your life noticed your absence — and so did your body.<br><br><div class="effect-list"><div class="effect-item"><span>Health</span><span style="color:var(--red)">-2</span></div><div class="effect-item"><span>Relationships</span><span style="color:var(--red)">-2</span></div><div class="effect-item"><span>Energy</span><span style="color:var(--red)">-3</span></div></div></div>';},

buildDebrief(){const s=this.state,c=id=>s._completed_actions&&s._completed_actions.includes(id),seen=id=>s._actions_seen&&s._actions_seen.includes(id),sa=ids=>ids.some(seen);
const items=[
{done:c('form_llc')||['llc','s_corp','c_corp','multi_entity'].includes(s.entity_structure),ids:['form_llc'],name:'Legal Protection',got:'You shielded your personal assets behind an LLC.',miss:'You saw the LLC option but never formed one — one lawsuit could reach everything you own.'},
{done:c('build_personal_credit_optimize')||c('build_personal_credit_repair'),ids:['build_personal_credit_optimize','build_personal_credit_repair'],name:'Credit Building',got:'You built your credit into an asset that unlocks cheap capital.',miss:'Credit-building was on the menu but you skipped it — the key that unlocks all good debt.'},
{done:c('payroll_setup'),ids:['payroll_setup'],name:'Pay Yourself Properly',got:'You put yourself on real payroll — clean books and S-Corp ready.',miss:'Owner payroll was available — skipping it left tax savings and lender credibility behind.'},
{done:c('s_corp_election'),ids:['s_corp_election'],name:'Tax-Smart Structure',got:'You elected S-Corp and legally cut your self-employment tax.',miss:'The S-Corp election was on the table — a tax lever employees never get.'},
{done:c('setup_accumulation_policy'),ids:['setup_accumulation_policy'],name:'The Tax-Free Money Engine',got:'You opened a cash-value policy — your tax-advantaged wealth engine.',miss:'You could have opened a cash-value policy — the tax-free passive income engine, untouched.'},
{done:(s.insurance_passive_loan_total||0)>0||!!s._passive_income_active,ids:['setup_accumulation_policy','fund_accumulation_policy','activate_passive_income'],name:'Tax-Free Passive Income',got:'Your policy throws off tax-free passive income — money without work.',miss:'You started down the policy path but never reached passive tax-free income.'},
{done:c('buy_real_estate')||(s.real_estate_owned||0)>0,ids:['buy_real_estate'],name:'Leverage Into Assets',got:"You used the bank's money to control income-producing property.",miss:'Real estate was available — you never used leverage to acquire a cash-flowing asset.'},
{done:c('private_lending'),ids:['private_lending'],name:'Become the Bank',got:"You lent capital for returns — money working while you don't.",miss:'Private lending was on the menu — you never put your capital to work as a lender.'},
{done:c('asset_protection')||c('multi_entity')||(s.trust_structure&&s.trust_structure!=='none'),ids:['asset_protection','multi_entity'],name:'Asset Protection',got:"You walled off your wealth so a lawsuit can't reach it.",miss:'Asset protection was available — your wealth sat exposed without it.'},
{done:c('build_offer'),ids:['build_offer'],name:'Irresistible Offer',got:'You packaged a premium offer that sells itself.',miss:'Refining your offer was available — the fastest lever on revenue, left unpulled.'},
{done:c('full_systemization')||(s.key_person_dependency!=null&&s.key_person_dependency<30),ids:['full_systemization'],name:'Systems = Freedom',got:'You built a business that runs without you — real freedom.',miss:'Full systemization was within reach — the business still leans on you.'}];
const learned=items.filter(i=>i.done),missed=items.filter(i=>!i.done&&sa(i.ids));
let h='<div class="epilogue-box" style="text-align:left;margin-top:16px;"><div style="font-size:1.1rem;font-weight:700;color:var(--gold);margin-bottom:4px;">What You Learned</div><div style="color:var(--text2);font-size:0.85rem;margin-bottom:10px;">You put '+learned.length+' core wealth principles into practice'+(missed.length?', and left '+missed.length+' on the table.':'.')+'</div>';
if(learned.length){h+='<div style="color:var(--text2);font-size:0.72rem;text-transform:uppercase;letter-spacing:1px;margin:10px 0 6px;">Put Into Practice</div>';for(const i of learned)h+='<div style="margin-bottom:7px;font-size:0.9rem;"><span style="color:var(--accent);font-weight:600;">&#10003; '+i.name+'</span> — '+i.got+'</div>';}
if(missed.length){h+='<div style="color:var(--text2);font-size:0.72rem;text-transform:uppercase;letter-spacing:1px;margin:14px 0 6px;">Left On The Table <span style="text-transform:none;opacity:0.7;">(you saw these but didn\'t take them)</span></div>';for(const i of missed)h+='<div style="margin-bottom:7px;font-size:0.9rem;opacity:0.9;"><span style="color:var(--gold);font-weight:600;">&#9675; '+i.name+'</span> — '+i.miss+'</div>';}
h+='</div>';return h;},
endGame(){
this.showScreen('end-screen');const scores=this.calculateFinalScores(),arch=this.determineArchetype(scores),composite=this.calcComposite(scores);
document.getElementById('end-title').textContent=arch.title;document.getElementById('end-subtitle').textContent=arch.subtitle;
this.drawRadarOn(document.getElementById('radar-canvas'),scores);
const labels={net_worth:'Net Worth',business_revenue:'Revenue',passive_income:'Passive Income',leverage_efficiency:'Leverage',tax_efficiency:'Tax Efficiency',lifestyle:'Lifestyle'};
document.getElementById('score-breakdown').innerHTML='<div class="stat-card wide"><div class="stat-value" style="color:var(--gold);font-size:1.5rem;">'+composite+' <span style="font-size:0.8rem;color:var(--text2)">/ 1000</span></div><div class="stat-label">Composite Score</div></div>'+Object.entries(scores).map(([k,v])=>'<div class="stat-card"><div class="stat-value" style="color:var(--accent)">'+Math.round(v)+'</div><div class="stat-label">'+(labels[k]||k)+'</div></div>').join('');
document.getElementById('epilogue').textContent=arch.epilogue;
document.getElementById('epilogue').insertAdjacentHTML('afterend',this.buildDebrief());
document.getElementById('end-save').innerHTML='<input id="player-name" class="name-input" placeholder="Enter your name for the leaderboard" maxlength="20"><button class="btn-primary" onclick="Game.saveToLeaderboard()">Save to Leaderboard</button>';},

saveToLeaderboard(){
const name=(document.getElementById('player-name').value||'').trim()||'Anonymous';
const scores=this.calculateFinalScores(),composite=this.calcComposite(scores);
const entry={name,archetype:this.archetype.id,months:this.month>36?36:this.month,composite,scores,date:new Date().toISOString().split('T')[0]};
let lb=JSON.parse(localStorage.getItem('ep_leaderboard')||'[]');lb.push(entry);localStorage.setItem('ep_leaderboard',JSON.stringify(lb));
const isRecord=lb.filter(e=>e.archetype===entry.archetype&&e.months===entry.months).sort((a,b)=>b.composite-a.composite)[0].name===entry.name;
document.getElementById('end-save').innerHTML='<div style="text-align:center;color:var(--accent);font-weight:600;margin:12px 0;">✓ Saved!'+(isRecord?' New record for '+this.archetype.label+' — '+entry.months+' months!':'')+'</div><button class="btn-outline" onclick="Game.showLeaderboard(\'end\')">View Leaderboard</button>';},

showLeaderboard(from){
this._lbFrom=from||'title';this.showScreen('leaderboard-screen');
const lb=JSON.parse(localStorage.getItem('ep_leaderboard')||'[]');
const archetypes=['stuck','new','established'],durations=[12,24,36];
const archLabels={stuck:'Stuck',new:'New',established:'Established'};
const selArch=this.archetype?this.archetype.id:'new',selDur=this.month||36;
let html='<div class="month-header"><h2>Leaderboard</h2></div>';
html+='<div class="lb-tabs" id="lb-arch-tabs">'+archetypes.map(a=>'<div class="lb-tab '+(a===selArch?'active':'')+'" onclick="Game.filterLB(\''+a+'\')">'+archLabels[a]+'</div>').join('')+'</div>';
html+='<div class="lb-tabs" id="lb-dur-tabs">'+durations.map(d=>'<div class="lb-tab '+(d===Math.min(36,Math.ceil(selDur/12)*12)?'active':'')+'" onclick="Game.filterLBDur('+d+')">'+d+' Mo</div>').join('')+'</div>';
html+='<div id="lb-list"></div>';
html+='<button class="btn-secondary" onclick="Game.showScreen(\''+(from==='end'?'end-screen':'title-screen')+'\')">Back</button>';
document.getElementById('lb-content').innerHTML=html;
this._lbArch=selArch;this._lbDur=Math.min(36,Math.ceil(selDur/12)*12);this.renderLBList();},

filterLB(arch){this._lbArch=arch;document.querySelectorAll('#lb-arch-tabs .lb-tab').forEach(t=>t.classList.remove('active'));event.target.classList.add('active');this.renderLBList();},
filterLBDur(dur){this._lbDur=dur;document.querySelectorAll('#lb-dur-tabs .lb-tab').forEach(t=>t.classList.remove('active'));event.target.classList.add('active');this.renderLBList();},

renderLBList(){const lb=JSON.parse(localStorage.getItem('ep_leaderboard')||'[]');const filtered=lb.filter(e=>e.archetype===this._lbArch&&e.months===this._lbDur).sort((a,b)=>b.composite-a.composite).slice(0,10);
document.getElementById('lb-list').innerHTML=filtered.length?filtered.map((e,i)=>'<div class="lb-entry fade-in"><span class="lb-rank">#'+(i+1)+'</span><span class="lb-name">'+e.name+'</span><span class="lb-score">'+e.composite+'pts</span><span class="lb-date">'+e.date+'</span></div>').join(''):'<div style="text-align:center;color:var(--text2);padding:30px;">No runs completed yet for this category.</div>';},

// v2 scoring — see DESIGN.md. Capital efficiency wins, not raw revenue.
calculateFinalScores(){const s=this.state;
const cv=s.insurance_cash_value||0,reOwned=s.real_estate_owned||0,reEquity=s.real_estate_equity||0,reDebt=s.real_estate_debt||0,invest=s.investment_positions||0,polLoan=s.insurance_loan_balance||0,bd=s.debt_breakdown||{};
const badDebt=(bd.credit_card||0)+(bd.collections||0);
const otherDebt=Math.max(0,(s.total_debt||0)-reDebt-(bd.credit_card||0)-(bd.collections||0)-polLoan);
// Passive, mostly tax-free, monthly income: policy-loan income (10%/yr once CV>=250k) + RE cashflow (~$700/property) + lending interest (12%/yr)
const passiveMonthly=(s._passive_income_active?cv*0.06/12:0)+reOwned*700+invest*0.01;
// Leverage efficiency: % of productive asset base financed with good (OPM) debt, ramped by asset scale
const controlled=reEquity+reDebt+invest+cv,goodDebt=reDebt+(s.business_installment_debt||0)+polLoan;
const lev=controlled<1000?0:Math.min(100,(goodDebt/controlled)*130*Math.min(1,controlled/50000));
// Net worth, leverage-aware: mortgage already netted inside reEquity; bad debt counts fully, other debt half, good debt not subtracted
const nw=(s.cash||0)+(s.personal_cash||0)+reEquity+invest+cv-polLoan-badDebt-otherDebt*0.5+(s.available_credit||0)*0.1;
const taxFreeBonus=passiveMonthly>0?Math.min(20,passiveMonthly/300):0;
return{net_worth:Math.min(100,Math.max(0,(nw/250000)*100)),business_revenue:Math.min(100,(s.monthly_revenue||0)/600),passive_income:Math.min(100,passiveMonthly/120),leverage_efficiency:Math.round(lev),tax_efficiency:Math.min(100,Math.max(0,30+(['s_corp','c_corp','multi_entity'].includes(s.entity_structure)?20:0)+((s.trust_structure&&s.trust_structure!=='none')?15:0)-(s._audit_events||0)*10+((0.25-(s.tax_rate||0.25))*200)+taxFreeBonus)),lifestyle:Math.min(100,(s.lifestyle_health||0)*0.2+(s.lifestyle_relationships||0)*0.2+(s.lifestyle_experiences||0)*0.15+(s.lifestyle_spiritual||0)*0.15+(s.lifestyle_philanthropy||0)*0.15+(s.lifestyle_legacy||0)*0.15)};},
// Strong lifestyle gate: a wrecked life caps the final score (no "paradise" if you burned out). lifestyle 65+ = full, ~32 = half, floored at 0.3.
calcComposite(scores){const w=CONFIG.scoring_weights?CONFIG.scoring_weights.dimensions:{};let c=0;for(const[k,d]of Object.entries(w))c+=(scores[k]||0)*(d.weight||0);const gate=Math.max(0.3,Math.min(1,(scores.lifestyle||0)/65));return Math.round(c*10*gate);},
determineArchetype(scores){let best=CONFIG.archetypes.win_archetypes[0],bs=-1;for(const a of CONFIG.archetypes.win_archetypes){let sc=0;if(a.requires_dominant&&scores[a.requires_dominant])sc=scores[a.requires_dominant];if(a.requires_secondary&&scores[a.requires_secondary])sc+=scores[a.requires_secondary]*0.5;if(a.requires_low)sc+=scores[a.requires_low]<30?20:-30;if(sc>bs){bs=sc;best=a;}}return best;},

drawRadarOn(canvas,scores){const ctx=canvas.getContext('2d'),w=canvas.width,h=canvas.height,cx=w/2,cy=h/2,r=w/2-30;const lb=['Net Worth','Passive','Leverage','Tax Eff.','Lifestyle','Revenue'],vl=[scores.net_worth,scores.passive_income,scores.leverage_efficiency,scores.tax_efficiency,scores.lifestyle,scores.business_revenue],n=6;ctx.clearRect(0,0,w,h);for(let ring=1;ring<=4;ring++){ctx.beginPath();for(let i=0;i<=n;i++){const a=(Math.PI*2*i/n)-Math.PI/2,rr=r*ring/4;i===0?ctx.moveTo(cx+rr*Math.cos(a),cy+rr*Math.sin(a)):ctx.lineTo(cx+rr*Math.cos(a),cy+rr*Math.sin(a));}ctx.strokeStyle='#2d3a50';ctx.lineWidth=1;ctx.stroke();}for(let i=0;i<n;i++){const a=(Math.PI*2*i/n)-Math.PI/2;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));ctx.strokeStyle='#2d3a50';ctx.stroke();ctx.fillStyle='#9ca3b4';ctx.font='10px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(lb[i],cx+(r+20)*Math.cos(a),cy+(r+20)*Math.sin(a));}ctx.beginPath();for(let i=0;i<=n;i++){const idx=i%n,a=(Math.PI*2*idx/n)-Math.PI/2,v=(vl[idx]/100)*r;i===0?ctx.moveTo(cx+v*Math.cos(a),cy+v*Math.sin(a)):ctx.lineTo(cx+v*Math.cos(a),cy+v*Math.sin(a));}ctx.fillStyle='rgba(16,185,129,0.2)';ctx.fill();ctx.strokeStyle='#10b981';ctx.lineWidth=2;ctx.stroke();for(let i=0;i<n;i++){const a=(Math.PI*2*i/n)-Math.PI/2,v=(vl[i]/100)*r;ctx.beginPath();ctx.arc(cx+v*Math.cos(a),cy+v*Math.sin(a),3,0,Math.PI*2);ctx.fillStyle='#10b981';ctx.fill();}},

fmt(n){n=Math.round(n);const a=Math.abs(n);return a>=1000?a.toLocaleString():a.toString();},
fmtMoney(n){n=Math.round(n);const a=Math.abs(n),str=a>=1000?a.toLocaleString():a.toString();return(n<0?'-$':'$')+str;},
formatStatName(k){return k.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());}
};
